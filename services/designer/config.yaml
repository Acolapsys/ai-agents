agent:
  name: 'Дизайнер'
  system_prompt: |
    Ты — Дизайнер, эксперт по созданию веб-интерфейсов. Твоя задача — генерировать код UI-компонентов на Vue 3 (Composition API) с использованием спокойной, контрастной цветовой палитры, подходящей для длительной работы.

    Ты должен возвращать **полный код компонента** (включая стили, например, через <style scoped>). Код должен быть самодостаточным, готовым к вставке в проект. Если нужно несколько компонентов, сгенерируй их по очереди, но каждый в отдельном блоке кода.

    Не используй инструменты – просто генерируй код напрямую. Формат ответа:
    - Сначала краткое описание (по желанию).
    - Затем код в тройных обратных кавычках с указанием языка (vue, html, javascript).

    Пример:
    Вот компонент кнопки:
    ```vue
    <template>
      <button class="btn-primary">{{ text }}</button>
    </template>
    <script setup>
    defineProps(['text'])
    </script>
    <style scoped>
    .btn-primary {
      background-color: #2c3e50;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      cursor: pointer;
    }
    </style>```

    Цветовая палитра для вдохновения: спокойные тона (например, #2c3e50, #34495e, #ecf0f1, #b0bec5). Но ты можешь предлагать свои варианты, главное – контрастность и удобство для глаз.

    Если пользователь просит UI Kit, создай набор базовых компонентов (кнопки, карточки, поля ввода, навигация) и объясни, как их использовать.
api:
  provider: 'n1n'
  key_env: 'API_KEY'
  base_url: 'https://api.n1n.ai/v1'
  model: 'qwen3-coder-480b-a35b-instruct' # отлично подходит для генерации кода

paths:
  data_root: '~/ai-agents/data'
  agent_data: 'designer'

tools:
  - name: 'generate_component'
    description: 'Генерирует HTML/CSS для UI-компонента (кнопка, карточка, форма, модальное окно).'
    parameters:
      type: 'object'
      properties:
        component_type:
          type: 'string'
          description: 'Тип компонента (button, card, form, modal, navbar, footer)'
        style:
          type: 'string'
          description: 'Стиль (modern, minimal, bold, glassmorphism, neomorphism)'
          default: 'modern'
        color_scheme:
          type: 'string'
          description: 'Цветовая схема (light, dark, blue, green, purple, custom)'
          default: 'light'
      required: ['component_type']

  - name: 'generate_page'
    description: 'Генерирует полную HTML-страницу по описанию.'
    parameters:
      type: 'object'
      properties:
        description:
          type: 'string'
          description: 'Описание страницы (например, "лендинг для финтех-приложения с формой регистрации")'
        style:
          type: 'string'
          description: 'Общий стиль страницы'
          default: 'modern'
        responsive:
          type: 'boolean'
          description: 'Адаптивная вёрстка'
          default: true
      required: ['description']

  - name: 'generate_css'
    description: 'Генерирует CSS или Tailwind-конфигурацию по описанию.'
    parameters:
      type: 'object'
      properties:
        description:
          type: 'string'
          description: 'Описание желаемых стилей'
        framework:
          type: 'string'
          description: 'Фреймворк (css, tailwind)'
          default: 'css'
      required: ['description']

  - name: 'analyze_screenshot'
    description: 'Анализирует скриншот и возвращает код (пока не реализовано).'
    parameters:
      type: 'object'
      properties:
        image_url:
          type: 'string'
          description: 'URL изображения (пока не используется)'
      required: []
