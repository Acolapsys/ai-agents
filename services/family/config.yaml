# ~/ai-agents/services/family/config.yaml
agent:
  name: 'Елена'
  system_prompt: |
    Ты — Елена, семейный советник. Твоя задача — помогать с семейными вопросами, давать советы по подаркам, напоминать о днях рождения и сохранять события. У тебя есть доступ к данным о семье через следующие инструменты (только их и вызывай):

    Когда ты получаешь данные от инструментов в формате JSON, анализируй их и давай ответ пользователю на естественном языке, используя эту информацию. Будь дружелюбной, как близкий друг, и старайся давать персонализированные советы.

    Пример:
    - Пользователь: "Что подарить жене?"
    - Ты вызываешь get_person_info("жена"), получаешь JSON с её интересами.
    - Затем ты формируешь ответ: "Эля интересуется фитнесом и рукоделием. Отличным подарком будет абонемент в фитнес-клуб или набор для вышивания. А если хочешь сделать сюрприз, можно подарить цветы и устроить романтический вечер!"

    Не повторяй ответы из примеров, формируй свои.

    Если результат вызова инструмента содержит поле "message", используй его для ответа пользователю. Если содержит поле "events", сформируй ответ на основе этих данных.

api:
  provider: 'n1n'
  key_env: 'N1N_API_KEY'
  base_url: 'https://api.n1n.ai/v1'
  model: 'qwen3-coder-480b-a35b-instruct'

paths:
  data_root: '~/ai-agents/data'
  agent_data: 'family'

tools:
  - name: 'get_family_members'
    description: 'Возвращает информацию о всех членах семьи в формате JSON.'
    parameters:
      type: 'object'
      properties: {}
      required: []

  - name: 'get_person_info'
    description: 'Возвращает информацию о человеке по имени или отношению в JSON формате (имя, возраст, интересы, предпочтения, дата рождения).'
    parameters:
      type: 'object'
      properties:
        name:
          type: 'string'
          description: 'Имя или родственное отношение персоны (например, "жена", "Лилия", "Дамир")'
      required: ['name']

  - name: 'get_upcoming_events'
    description: 'Возвращает список ближайших событий (дни рождения, важные даты) на указанное количество дней вперёд. Результат в формате JSON. Параметр "days" определяет количество дней для поиска (по умолчанию 30).'
    parameters:
      type: 'object'
      properties:
        days:
          type: 'integer'
          description: 'Количество дней для поиска (по умолчанию 30)'
          default: 30
      required: []

  - name: 'add_event'
    description: "Добавляет семейное событие (например, 'Миша пошёл в школу')."
    parameters:
      type: 'object'
      properties:
        event_text:
          type: 'string'
          description: 'Описание события'
      required: ['event_text']

  - name: 'add_reminder'
    description: 'Создаёт напоминание (сохраняет в список).'
    parameters:
      type: 'object'
      properties:
        text:
          type: 'string'
          description: 'Текст напоминания'
      required: ['text']
