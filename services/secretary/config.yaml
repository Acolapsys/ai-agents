agent:
  name: 'Михаил'
  system_prompt: |
    Ты — личный секретарь. Помогаешь с задачами, заметками, списком покупок и напоминаниями.

    Если пользователь просит создать задачу (например, "создай задачу", "добавь задачу", "запиши в список дел"), ты ОБЯЗАН использовать инструмент `create_task`.

    При использовании инструмента `create_task`:
    - Параметр `title` должен содержать краткое, но осмысленное описание задачи. Извлеки его из сообщения пользователя. Если сообщение содержит только число (например, "задачу 2"), всё равно преврати его в полноценное название, например: "Задача 2" или добавь контекст из предыдущих сообщений.
    - Если в сообщении есть дополнительные детали (например, "купить молоко и хлеб"), помести их в параметр `description`.
    - Параметр `priority` можешь заполнить, если пользователь явно указал приоритет (например, "срочно", "важно", "низкий приоритет"). По умолчанию ставь 'medium'.

    Если пользователь спрашивает "какие задачи?", "покажи задачи", "список задач", "что у меня в списке дел" или подобное, ты ОБЯЗАН использовать инструмент `get_tasks`.

    Если пользователь спрашивает о задачах, связанных с конкретным проектом или темой, используй параметр `search` инструмента `get_tasks`, чтобы отфильтровать задачи по ключевым словам. Например, на вопрос "задачи для проекта Nexus" вызови `get_tasks(search="Nexus")`.

    НИ В КОЕМ СЛУЧАЕ не отвечай текстом, не вызвав инструмент. Сначала вызови инструмент, получи результат, а потом сформируй ответ.

api:
  provider: 'n1n' # или "openrouter"
  key_env: 'API_KEY' # имя переменной окружения с ключом
  base_url: 'https://api.n1n.ai/v1'
  model: 'qwen3-coder-480b-a35b-instruct'

paths:
  data_root: '~/ai-agents/data' # базовый путь к данным
  agent_data: 'secretary' # подпапка для этого агента

tools:
  - name: 'save_note'
    description: 'Сохраняет заметку в файл'
    parameters:
      type: 'object'
      properties:
        content:
          type: 'string'
          description: 'Текст заметки'
      required: ['content']
  - name: 'add_to_shopping_list'
    description: 'Добавляет товар в список покупок'
    parameters:
      type: 'object'
      properties:
        item:
          type: 'string'
          description: 'Название товара'
        quantity:
          type: 'integer'
          description: 'Количество'
          default: 1
      required: ['item']
  - name: 'create_reminder'
    description: 'Создаёт напоминание'
    parameters:
      type: 'object'
      properties:
        text:
          type: 'string'
        time:
          type: 'string'
      required: ['text', 'time']
  - name: 'add_task'
    description: 'Добавляет задачу'
    parameters:
      type: 'object'
      properties:
        task:
          type: 'string'
      required: ['task']
  - name: 'create_task'
    description: 'Создаёт новую задачу в таск-трекере.'
    parameters:
      type: 'object'
      properties:
        title:
          type: 'string'
          description: 'Название задачи'
        description:
          type: 'string'
          description: 'Подробное описание задачи (необязательно)'
        priority:
          type: 'string'
          enum: ['low', 'medium', 'high', 'critical']
          description: 'Приоритет задачи'
          default: 'medium'
      required: ['title']
  - name: 'get_tasks'
    description: 'Возвращает список задач из таск-трекера с возможностью фильтрации по статусу, исполнителю и поиска по ключевым словам.'
    parameters:
      type: 'object'
      properties:
        status:
          type: 'string'
          enum: ['new', 'in_progress', 'done', 'archived']
          description: 'Фильтр по статусу'
        assignee:
          type: 'string'
          description: 'Фильтр по исполнителю (например, "user" или "ai")'
        search:
          type: 'string'
          description: 'Поиск по названию или описанию задачи (ключевые слова)'
      required: []
