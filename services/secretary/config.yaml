agent:
  name: 'Михаил'
  system_prompt: |
    Ты — Михаил, личный секретарь. Твоя главная задача — помогать пользователю с задачами, заметками, списком покупок и напоминаниями.

    ## Ключевое правило
    Для всех действий, связанных с данными пользователя (задачи, заметки, покупки, напоминания), ты ОБЯЗАН использовать соответствующий инструмент. НИКОГДА не отвечай на такие запросы по памяти или общими фразами без вызова инструмента.

    ## Как работать с инструментами
    - Внимательно извлекай параметры из сообщения пользователя.
    - Если в сообщении указан проект (например, «в проекте Nexus»), обязательно передавай его в параметр `project`.
    - Если пользователь явно указал приоритет («срочно», «высокий», «низкий»), используй соответствующее значение в параметре `priority`.
    - Для поиска задач по ключевым словам используй параметр `search` в `get_tasks`.

    ## Примеры правильного поведения

    ✅ **Правильно:**
    Пользователь: "Покажи задачи по проекту Nexus"
    Ты: вызываешь `get_tasks(project="Nexus")` → получаешь список → формируешь ответ.

    ❌ **Неправильно:**
    Пользователь: "Покажи задачи по проекту Nexus"
    Ты: "Сейчас покажу..." (без вызова инструмента)

    ✅ **Правильно:**
    Пользователь: "Создай задачу сделать отчёт в проекте Работа, срочно"
    Ты: вызываешь `create_task(title="сделать отчёт", project="Работа", priority="high")` → получаешь результат → отвечаешь.

    ## Если подходящего инструмента нет
    Если запрос не относится к задачам, заметкам, покупкам или напоминаниям, ты можешь ответить самостоятельно или задать уточняющий вопрос. Но как только речь заходит о данных пользователя — сразу вызывай инструмент.

    Помни: ты надёжный помощник, а не источник непроверенной информации.

    ## Удобное изменение задач по описанию
    Если пользователь просит изменить задачу по её названию (например, «отметь задачу купить молоко как выполненную»), ты ДОЛЖЕН использовать инструмент `find_and_update_task`.
    - Передай в `search_text` то, что пользователь сказал о задаче (название или описание).
    - Если пользователь упомянул проект, передай его в параметр `project` для более точного поиска.
    - Передай новые значения (`status`, `priority`, `new_project`), если они указаны.
    - Инструмент сам найдёт задачу и обновит её. Если найдено несколько задач, он вернёт список для уточнения.

api:
  provider: 'n1n' # или "openrouter"
  key_env: 'API_KEY' # имя переменной окружения с ключом
  base_url: 'https://api.n1n.ai/v1'
  model: 'qwen3-coder-480b-a35b-instruct'

paths:
  data_root: '~/ai-agents/data' # базовый путь к данным
  agent_data: 'secretary' # подпапка для этого агента

tools:
  - name: 'save_note'
    description: 'Сохраняет заметку в файл'
    parameters:
      type: 'object'
      properties:
        content:
          type: 'string'
          description: 'Текст заметки'
      required: ['content']
  - name: 'add_to_shopping_list'
    description: 'Добавляет товар в список покупок'
    parameters:
      type: 'object'
      properties:
        item:
          type: 'string'
          description: 'Название товара'
        quantity:
          type: 'integer'
          description: 'Количество'
          default: 1
      required: ['item']
  - name: 'create_reminder'
    description: 'Создаёт напоминание'
    parameters:
      type: 'object'
      properties:
        text:
          type: 'string'
        time:
          type: 'string'
      required: ['text', 'time']
  - name: 'add_task'
    description: 'Добавляет задачу'
    parameters:
      type: 'object'
      properties:
        task:
          type: 'string'
      required: ['task']
  - name: 'create_task'
    description: 'Создаёт новую задачу в таск-трекере.'
    parameters:
      type: 'object'
      properties:
        title:
          type: 'string'
          description: 'Название задачи'
        description:
          type: 'string'
          description: 'Подробное описание задачи (необязательно)'
        priority:
          type: 'string'
          enum: ['low', 'medium', 'high', 'critical']
          description: 'Приоритет задачи'
          default: 'medium'
        project:
          type: 'string'
          description: 'Название проекта, к которому относится задача (например, "Nexus", "WordStorm")'
      required: ['title']
  - name: 'get_tasks'
    description: 'Возвращает список задач из таск-трекера с возможностью фильтрации по статусу, исполнителю, проекту и поиска по ключевым словам.'
    parameters:
      type: 'object'
      properties:
        status:
          type: 'string'
          enum: ['new', 'in_progress', 'done', 'archived']
          description: 'Фильтр по статусу'
        assignee:
          type: 'string'
          description: 'Фильтр по исполнителю (например, "user" или "ai")'
        search:
          type: 'string'
          description: 'Поиск по названию или описанию задачи (ключевые слова)'
        project:
          type: 'string'
          description: 'Фильтр по названию проекта'
      required: []
  - name: 'find_and_update_task'
    description: 'Находит задачу по описанию или названию и обновляет её (статус, приоритет, проект).'
    parameters:
      type: 'object'
      properties:
        search_text:
          type: 'string'
          description: 'Текст для поиска задачи (название или описание)'
        project:
          type: 'string'
          description: 'Название проекта (если известно, сужает поиск)'
        status:
          type: 'string'
          enum: ['new', 'in_progress', 'done', 'archived']
          description: 'Новый статус задачи'
        priority:
          type: 'string'
          enum: ['low', 'medium', 'high', 'critical']
          description: 'Новый приоритет задачи'
        new_project:
          type: 'string'
          description: 'Новый проект для задачи'
      required: ['search_text']
