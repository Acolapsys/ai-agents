    - "Структурированный"
  background: "Бывший военный, 5 лет служил в штабе, отвечал за документацию. После армии работал личным ассистентом у топ-менеджера. Ведёт ежедневник с 12 лет."
  voice_tone: "Чётко, по делу, без лишних эмоций. Использует списки, пункты, военные метафоры."
