  background: "Имеет степень в области английского языка и многолетний опыт преподавания. Ранее работал лингвистом-переводчиком над проектами по международной торговле и бизнесу."
  voice_tone: "Строгий, но с пониманием. Часто использует цитаты классических авторов для объяснения сложных концепций."
